<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Theme Variables */
        :root {
            --bg-color: #1e1e2e;
            --text-color: #ffffff;
            --board-bg: #2d2d3a;
            --cell-bg: #3a3a4a;
            --cell-hover: #4a4a5a;
            --cell-revealed: #252530;
            --cell-border: #4a4a5a;
            --button-bg: #5568d3;
            --button-hover: #6a7ce8;
            --card-bg: #2d2d3a;
            --input-bg: #3a3a4a;
            --input-border: #4a4a5a;
        }

        /* Minesweeper Styling */
        #minesweeper-board {
            user-select: none;
            margin: 0 auto;
            display: inline-grid;
            gap: 0;
            background: var(--board-bg);
            padding: 10px;
            border-radius: 16px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1), 0 20px 40px rgba(0,0,0,0.2);
        }
        .ms-cell {
            box-sizing: border-box;
            width: 48px;
            height: 48px;
            background-color: var(--cell-bg);
            border: 1px solid var(--cell-border);
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        .ms-cell:hover:not(.revealed):not(.flagged) {
            transform: translateY(-1px);
            background-color: var(--cell-hover);
        }
        .ms-cell.revealed {
            border-color: var(--cell-border);
            background-color: var(--cell-revealed);
            cursor: default;
            box-shadow: none;
        }
        .ms-cell.flagged {
            background-color: var(--cell-bg);
            color: transparent;
        }
        .ms-cell.flagged.text-mode {
            color: var(--text-color);
        }
        .ms-cell.mine { background-color: #fecaca; color: #991b1b; }
        .ms-cell img {
            width: 36px;
            height: 36px;
            image-rendering: pixelated;
        }
        .ms-cell.revealed[data-mines="1"] { color: #0000ff; }
        .ms-cell.revealed[data-mines="2"] { color: #008000; }
        .ms-cell.revealed[data-mines="3"] { color: #ff0000; }
        .ms-cell.revealed[data-mines="4"] { color: #000080; }
        .ms-cell.revealed[data-mines="5"] { color: #800000; }
        .ms-cell.revealed[data-mines="6"] { color: #008080; }
        .ms-cell.revealed[data-mines="7"] { color: #000000; }
        .ms-cell.revealed[data-mines="8"] { color: #808080; }

        /* Text Mode Styles */
        .ms-cell.text-mode {
            font-size: 1.5rem;
        }
        .ms-cell.text-mode img {
            display: none;
        }

        /* Text Mode Toggle */
        .text-mode-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .text-mode-toggle label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: var(--card-bg);
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            color: var(--text-color);
        }

        /* Volume Slider */
        .volume-slider {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }
        .volume-slider label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            color: var(--text-color);
        }
        .volume-slider input[type="range"] {
            width: 100px;
            cursor: pointer;
        }

        /* Score Edit Modal */
        .score-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .score-modal.active {
            display: flex;
        }
        .score-modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            min-width: 300px;
        }
        .score-modal-content h3 {
            margin-bottom: 16px;
            color: var(--text-color);
        }
        .score-modal-content input {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 16px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
        }
        .score-modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .score-modal-buttons button {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .score-modal-buttons .cancel {
            background: var(--input-bg);
            color: var(--text-color);
        }
        .score-modal-buttons .save {
            background: var(--button-bg);
            color: white;
        }
    </style>
</head>
<body class="font-sans min-h-screen pb-10" style="background-color: var(--bg-color); color: var(--text-color);">

    <div class="text-mode-toggle">
        <label>
            <input type="checkbox" id="textMode" onchange="toggleTextMode()">
            <span>Text Mode</span>
        </label>
    </div>

    <div class="volume-slider">
        <label>
            <span>🔊</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" onchange="changeVolume(this.value)">
        </label>
    </div>

    <div class="score-modal" id="scoreModal">
        <div class="score-modal-content">
            <h3>Edit Score</h3>
            <input type="number" id="scoreInput" value="0">
            <div class="score-modal-buttons">
                <button class="cancel" onclick="closeScoreModal()">Cancel</button>
                <button class="save" onclick="saveScore()">Save</button>
            </div>
        </div>
    </div>

    <script>
let msTotalScore = parseInt(localStorage.getItem('msTotalScore')) || 0;
let msTextMode = localStorage.getItem('msTextMode') === 'true';
let msVolume = parseFloat(localStorage.getItem('msVolume')) || 1;
let cheatCodeSequence = '';
const cheatCode = '12346';
let msBoard = [];
let msRows = 8, msCols = 8, msMinesCount = 10;
let msGameOver = false;
let msFirstClick = true;
let msTimerInterval;
let msStartTime = 0;
let msFinalTime = 0;
let msFlagsCount = 0;
document.addEventListener('DOMContentLoaded', () => {
    updateBestTimesDisplay();
    startMinesweeper();
});

function startMinesweeper() {
    const diff = document.getElementById('minesweeper-difficulty').value;
    const settings = getMinesweeperSettings(diff);

    const winSnd = document.getElementById('snd-win');
    if (winSnd) {
        winSnd.pause();
        winSnd.currentTime = 0;
    }

    msRows = settings.rows;
    msCols = settings.cols;
    msMinesCount = settings.mines;

    document.getElementById('minesweeper-total-score').innerText = msTotalScore;

    msGameOver = false;
    msFirstClick = true;
    msFinalTime = 0;
    msFlagsCount = msMinesCount;
    clearInterval(msTimerInterval);

    document.getElementById('minesweeper-timer').innerText = "0";
    document.getElementById('minesweeper-flags').innerText = msFlagsCount;
    const status = document.getElementById('minesweeper-status');
    status.innerText = "";
    status.className = "text-center mt-4 font-bold text-lg";

    initMSBoard();
}

// Load best times on startup
function updateBestTimesDisplay() {
    const bestTimes = JSON.parse(localStorage.getItem('msBestTimes')) || { easy: null, medium: null, hard: null };
    document.getElementById('best-easy').innerText = bestTimes.easy ? bestTimes.easy.toFixed(2) + 's' : '--';
    document.getElementById('best-medium').innerText = bestTimes.medium ? bestTimes.medium.toFixed(2) + 's' : '--';
    document.getElementById('best-hard').innerText = bestTimes.hard ? bestTimes.hard.toFixed(2) + 's' : '--';
}

function saveBestTime(difficulty, time) {
    // We only track best times for standard difficulties, not 'custom'
    if (difficulty === 'custom') return;

    const bestTimes = JSON.parse(localStorage.getItem('msBestTimes')) || { easy: null, medium: null, hard: null };
    
    // If no best time exists or the current time is faster, update it
    if (bestTimes[difficulty] === null || time < bestTimes[difficulty]) {
        bestTimes[difficulty] = time;
        localStorage.setItem('msBestTimes', JSON.stringify(bestTimes));
        updateBestTimesDisplay();
        return true; // New record!
    }
    return false;
}



function getMinesweeperSettings(diff) {
    if (diff === 'easy') return { rows: 8, cols: 8, mines: 10 };
    if (diff === 'medium') return { rows: 12, cols: 12, mines: 20 };
    if (diff === 'hard') return { rows: 16, cols: 16, mines: 40 };

    const rows = parseInt(document.getElementById('minesweeper-custom-rows').value, 10) || 10;
    const cols = parseInt(document.getElementById('minesweeper-custom-cols').value, 10) || 10;
    let mines = parseInt(document.getElementById('minesweeper-custom-mines').value, 10);

    const safeRows = Math.min(Math.max(rows, 4), 30);
    const safeCols = Math.min(Math.max(cols, 4), 30);
    const maxMines = Math.max(1, Math.min(safeRows * safeCols - 1, mines || Math.floor(safeRows * safeCols * 0.12)));

    document.getElementById('minesweeper-custom-rows').value = safeRows;
    document.getElementById('minesweeper-custom-cols').value = safeCols;
    document.getElementById('minesweeper-custom-mines').value = maxMines;

    return { rows: safeRows, cols: safeCols, mines: maxMines };
}

function toggleCustomMinesweeper() {
    const customPanel = document.getElementById('minesweeper-custom-panel');
    if (document.getElementById('minesweeper-difficulty').value === 'custom') {
        customPanel.style.display = 'grid';
    } else {
        customPanel.style.display = 'none';
    }
}

function initMSBoard() {
    const boardEl = document.getElementById('minesweeper-board');
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${msCols}, 48px)`;
    boardEl.style.width = 'min-content';
    msBoard = [];

    for (let r = 0; r < msRows; r++) {
        msBoard[r] = [];
        for (let c = 0; c < msCols; c++) {
            const cellEl = document.createElement('div');
            cellEl.className = 'ms-cell';
            cellEl.id = `ms-${r}-${c}`;
            cellEl.dataset.mines = '0';

            cellEl.onmousedown = (e) => {
                if (e.button === 0) {
                    handleMSClick(r, c);
                }
            };

            cellEl.oncontextmenu = (e) => {
                e.preventDefault();
                handleMSRightClick(r, c);
            };

            boardEl.appendChild(cellEl);
            msBoard[r][c] = { mine: false, revealed: false, flagged: false, neighbors: 0 };
        }
    }
}

function handleMSClick(r, c) {
    if (msGameOver || msBoard[r][c].flagged || msBoard[r][c].revealed) return;

    if (msFirstClick) {
        document.getElementById('minesweeper-status').innerText = "Generating board...";
        msFirstClick = false;
        setTimeout(() => {
            placeMines(r, c);
            startMSTimer();
            revealCell(r, c);
            document.getElementById('minesweeper-status').innerText = "";
        }, 10);
        return;
    }

    revealCell(r, c);
}

function placeMines(safeR, safeC) {
    let attempts = 0;
    let solvable = false;
    const generationStartTime = performance.now(); // Renamed to avoid confusion

    while (!solvable && attempts < 100) {
        attempts++;
        
        // IMPORTANT: Clear the board from the previous failed attempt
        for (let r = 0; r < msRows; r++) {
            for (let c = 0; c < msCols; c++) {
                msBoard[r][c].mine = false;
                msBoard[r][c].neighbors = 0;
            }
        }

        // Randomly place mines
        let minesPlaced = 0;
        while (minesPlaced < msMinesCount) {
            const r = Math.floor(Math.random() * msRows);
            const c = Math.floor(Math.random() * msCols);
            const isSafeZone = Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1;

            if (!msBoard[r][c].mine && !isSafeZone) {
                msBoard[r][c].mine = true;
                minesPlaced++;
            }
        }

        // Calculate neighbor counts
        for (let r = 0; r < msRows; r++) {
            for (let c = 0; c < msCols; c++) {
                if (!msBoard[r][c].mine) {
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (msBoard[r + dr] && msBoard[r + dr][c + dc]?.mine) count++;
                        }
                    }
                    msBoard[r][c].neighbors = count;
                }
            }
        }

        // Run the logic solver
        solvable = checkSolvability(safeR, safeC);
        
        if (!solvable) {
            console.log(`Attempt ${attempts}: Board discarded (Required a guess).`);
        }
    }

    const duration = (performance.now() - generationStartTime).toFixed(2);
    console.log(`%c✅ Solvable board found in ${attempts} attempts! (${duration}ms)`, "color: green; font-weight: bold;");
}

function checkSolvability(startR, startC) {
    let vRevealed = Array.from({ length: msRows }, () => Array(msCols).fill(false));
    let vFlagged = Array.from({ length: msRows }, () => Array(msCols).fill(false));
    
    const vCascade = (r, c) => {
        if (r < 0 || r >= msRows || c < 0 || c >= msCols || vRevealed[r][c]) return;
        vRevealed[r][c] = true;
        if (msBoard[r][c].neighbors === 0) {
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) vCascade(r + dr, c + dc);
            }
        }
    };

    vCascade(startR, startC);

    let changed = true;
    while (changed) {
        changed = false;
        for (let r = 0; r < msRows; r++) {
            for (let c = 0; c < msCols; c++) {
                if (!vRevealed[r][c] || msBoard[r][c].neighbors === 0) continue;

                let neighbors = [];
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < msRows && nc >= 0 && nc < msCols && (dr !== 0 || dc !== 0)) {
                            neighbors.push({ r: nr, c: nc });
                        }
                    }
                }

                let hidden = neighbors.filter(n => !vRevealed[n.r][n.c]);
                let flags = neighbors.filter(n => vFlagged[n.r][n.c]);
                let unflaggedHidden = hidden.filter(n => !vFlagged[n.r][n.c]);

                if (unflaggedHidden.length === 0) continue;

                // Rule: All remaining hidden are mines
                if (msBoard[r][c].neighbors === hidden.length) {
                    unflaggedHidden.forEach(n => { vFlagged[n.r][n.c] = true; changed = true; });
                }
                // Rule: All remaining hidden are safe
                if (msBoard[r][c].neighbors === flags.length) {
                    unflaggedHidden.forEach(n => { vCascade(n.r, n.c); changed = true; });
                }
            }
        }
    }

    let totalRevealed = 0;
    for (let r = 0; r < msRows; r++) {
        for (let c = 0; c < msCols; c++) { if (vRevealed[r][c]) totalRevealed++; }
    }
    return totalRevealed === (msRows * msCols) - msMinesCount;
}

function revealCell(r, c) {
    if (r < 0 || r >= msRows || c < 0 || c >= msCols) return;
    const cell = msBoard[r][c];
    if (cell.revealed || cell.flagged) return;

    cell.revealed = true;
    const el = document.getElementById(`ms-${r}-${c}`);
    el.classList.add('revealed');
    el.classList.remove('flagged');
    el.dataset.mines = cell.neighbors;

    if (cell.mine) {
        playMSAudio('snd-explode'); 
        el.innerHTML = msTextMode ? 'X' : '<img src="bomb.png" alt="bomb">';
        if (msTextMode) el.classList.add('text-mode');
        el.classList.add('mine');
        gameOver(false);
        return;
    }

    playMSAudio('snd-reveal');

    if (cell.neighbors > 0) {
        el.innerHTML = msTextMode ? cell.neighbors : `<img src="${cell.neighbors}.png" alt="${cell.neighbors}">`;
        if (msTextMode) el.classList.add('text-mode');
    } else {
        el.innerHTML = '';
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                revealCell(r + dr, c + dc);
            }
        }
    }
    checkWin();
}

function handleMSRightClick(r, c) {
    if (msGameOver || msBoard[r][c].revealed) return;
    const cell = msBoard[r][c];
    cell.flagged = !cell.flagged;

    const el = document.getElementById(`ms-${r}-${c}`);
    if (cell.flagged) {
        playMSAudio('snd-flag');
        el.classList.add('flagged');
        el.innerHTML = msTextMode ? 'F' : '<img src="flag.png" alt="flag">';
        if (msTextMode) el.classList.add('text-mode');
        msFlagsCount--;
    } else {
        el.classList.remove('flagged');
        el.innerHTML = '';
        el.classList.remove('text-mode');
        msFlagsCount++;
    }
    document.getElementById('minesweeper-flags').innerText = msFlagsCount;
}

function startMSTimer() {
    msStartTime = Date.now();
    msTimerInterval = setInterval(() => {
        const elapsed = (Date.now() - msStartTime) / 1000;
        document.getElementById('minesweeper-timer').innerText = Math.floor(elapsed);
    }, 16);
}

function checkWin() {
    let revealed = 0;
    for (let r = 0; r < msRows; r++) {
        for (let c = 0; c < msCols; c++) {
            if (msBoard[r][c].revealed) revealed++;
        }
    }
    if (revealed === (msRows * msCols) - msMinesCount) {
        gameOver(true);
    }
}

function gameOver(won) {
    msGameOver = true;
    clearInterval(msTimerInterval);
    msFinalTime = ((Date.now() - msStartTime) / 1000) || 0;

    const status = document.getElementById('minesweeper-status');
    const diff = document.getElementById('minesweeper-difficulty').value;
    document.getElementById('minesweeper-timer').innerText = msFinalTime.toFixed(2);

    let gamePoints = 0;
    let correctFlags = 0;
    let wrongFlags = 0;
    let speedScore = 0;
    let pointBreakdown = "";

    if (won) {
        playMSAudio('snd-win');
    }

    // count flags
    for (let r = 0; r < msRows; r++) {
        for (let c = 0; c < msCols; c++) {
            if (msBoard[r][c].flagged) {
                if (msBoard[r][c].mine) correctFlags++;
                else wrongFlags++;
            }
        }
    }

    // flag scoring (always)
    gamePoints += correctFlags * 5;
    gamePoints -= wrongFlags * 10;

    if (won) {
        gamePoints += 100;

        const parTime = msMinesCount * 2;
        speedScore = Math.max(0, Math.floor(parTime - msFinalTime));
        gamePoints += speedScore;
    } else {
        gamePoints = Math.max(0, gamePoints);
    }

    // SAVE BEST TIME LOGIC
    if (won) {
        const isNewRecord = saveBestTime(diff, msFinalTime);
        if (isNewRecord) {
            pointBreakdown += "\nNEW PERSONAL BEST!";
        }
    }

    // difficulty
    let difficultyMultiplier = 1;
    if (msRows === 12) difficultyMultiplier = 1.5;
    if (msRows === 16) difficultyMultiplier = 2;

    gamePoints = Math.floor(gamePoints * difficultyMultiplier);

    // save score
    msTotalScore += gamePoints;
    localStorage.setItem('msTotalScore', msTotalScore);
    document.getElementById('minesweeper-total-score').innerText = msTotalScore;

    // breakdown (only meaningful on win)
    if (won) {
        pointBreakdown = `
Base: +100
Flags: +${correctFlags * 5} / -${wrongFlags * 10}
Speed: +${speedScore}
Total: +${gamePoints}
`;
    }

    status.innerText = won
        ? `YOU WIN!\n${pointBreakdown}\nTime: ${msFinalTime.toFixed(2)}s`
        : `GAME OVER! (+${gamePoints}) Time: ${msFinalTime.toFixed(2)}s`;

    status.className = won
        ? "text-green-600 font-bold text-center mt-4"
        : "text-red-600 font-bold text-center mt-4";

    // reveal everything
    for (let r = 0; r < msRows; r++) {
        for (let c = 0; c < msCols; c++) {
            const cell = msBoard[r][c];
            const el = document.getElementById(`ms-${r}-${c}`);
            if (!el) continue;

            if (cell.mine && cell.flagged) {
                el.classList.add('revealed');
                el.innerHTML = msTextMode ? 'F' : '<img src="flagright.png">';
                if (msTextMode) el.classList.add('text-mode');
            }
            else if (cell.mine) {
                el.classList.add('revealed', 'mine');
                el.innerHTML = msTextMode ? 'X' : '<img src="bomb.png" alt="bomb">';
                if (msTextMode) el.classList.add('text-mode');
            }
            else if (cell.flagged) {
                el.classList.add('revealed');
                el.innerHTML = msTextMode ? 'F' : '<img src="flagwrong.png">';
                if (msTextMode) el.classList.add('text-mode');
            }
        }
    }
}

function playMSAudio(id) {
    const sound = document.getElementById(id);
    if (sound) {
        sound.volume = msVolume;
        sound.currentTime = 0; // Reset to start for rapid clicks
        sound.play().catch(e => console.log("Audio play blocked until user interacts"));
    }
}

function changeVolume(value) {
    msVolume = parseFloat(value);
    localStorage.setItem('msVolume', msVolume);
    // Update all audio elements
    const audioElements = document.querySelectorAll('audio');
    audioElements.forEach(audio => {
        audio.volume = msVolume;
    });
}

function toggleTextMode() {
    msTextMode = document.getElementById('textMode').checked;
    localStorage.setItem('msTextMode', msTextMode);
    // Re-render the board to apply the change
    if (msBoard.length > 0) {
        for (let r = 0; r < msRows; r++) {
            for (let c = 0; c < msCols; c++) {
                const cell = msBoard[r][c];
                const el = document.getElementById(`ms-${r}-${c}`);
                if (cell.revealed) {
                    if (cell.mine) {
                        el.innerHTML = msTextMode ? 'X' : '<img src="bomb.png" alt="bomb">';
                    } else if (cell.neighbors > 0) {
                        el.innerHTML = msTextMode ? cell.neighbors : `<img src="${cell.neighbors}.png" alt="${cell.neighbors}">`;
                    }
                } else if (cell.flagged) {
                    el.innerHTML = msTextMode ? 'F' : '<img src="flag.png" alt="flag">';
                }
                if (msTextMode) {
                    el.classList.add('text-mode');
                } else {
                    el.classList.remove('text-mode');
                }
            }
        }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('textMode').checked = msTextMode;
    document.getElementById('volumeSlider').value = msVolume;
    // Set initial volume for all audio elements
    const audioElements = document.querySelectorAll('audio');
    audioElements.forEach(audio => {
        audio.volume = msVolume;
    });
});

document.addEventListener('DOMContentLoaded', toggleCustomMinesweeper);

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        startMinesweeper();
    }
    
    // Cheat code detection
    if (e.key >= '0' && e.key <= '9') {
        cheatCodeSequence += e.key;
        if (cheatCodeSequence.length > 10) {
            cheatCodeSequence = cheatCodeSequence.slice(-10);
        }
        if (cheatCodeSequence.includes(cheatCode)) {
            openScoreModal();
            cheatCodeSequence = '';
        }
    }
});

function openScoreModal() {
    document.getElementById('scoreInput').value = msTotalScore;
    document.getElementById('scoreModal').classList.add('active');
}

function closeScoreModal() {
    document.getElementById('scoreModal').classList.remove('active');
}

function saveScore() {
    const newScore = parseInt(document.getElementById('scoreInput').value) || 0;
    msTotalScore = newScore;
    localStorage.setItem('msTotalScore', msTotalScore);
    document.getElementById('minesweeper-total-score').innerText = msTotalScore;
    closeScoreModal();
}

    </script>
